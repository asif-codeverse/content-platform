version: "3.9"
services:
  api:
    build: ./server
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - redis
    environment:
      MONGODB_URI: mongodb://mongo:27017/content-platform
      REDIS_URL: redis://redis:6379

  mongo:
    image: mongo
    ports:
      - "27017:27017"

  redis:
    image: redis
    ports:
      - "6379:6379"