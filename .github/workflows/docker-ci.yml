name: Docker CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: |
          docker build \
            -t content-platform-api \
            ./server

      - name: Build Frontend Docker Image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=http://localhost:5001/api/v1 \
            -t content-platform-client \
            ./client